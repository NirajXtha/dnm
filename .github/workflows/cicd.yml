name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 🔧 Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: 📦 Restore NuGet Packages
        run: |
          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          Write-Host "Restoring solution: $sln"
          # Explicitly pointing to the packages directory helps MSBuild resolve HintPaths
          nuget restore "$sln" -PackagesDirectory "${{ github.workspace }}\packages"
        shell: pwsh

      - name: 🏗️ Build Solution
        run: |
          $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "csc.exe" | `
            Where-Object { $_.FullName -match "Roslyn" } | `
            Select-Object -First 1).DirectoryName

          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          Write-Host "Building Solution: $sln"

          # NOTE: "Any CPU" (with space) is required for .sln files 
          # "AnyCPU" (no space) is usually for .csproj files
          msbuild "$sln" `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:VisualStudioVersion=17.0 `
            /p:SolutionDir="${{ github.workspace }}\\" `
            /p:CscToolPath="$roslynPath" `
            /p:CscToolExe="csc.exe" `
            /p:RestorePackages=false `
            /m `
            /verbosity:minimal
        shell: pwsh

      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Standard folders to copy
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $from = Join-Path $src $folder
            if (Test-Path $from) {
              Copy-Item -Path $from -Destination (Join-Path $dest $folder) -Recurse -Force
            }
          }

          # bin: Grab DLLs from the Web bin where they are compiled
          $binSrc  = "${{ github.workspace }}\NeoErp.Web\bin"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null

          if (Test-Path $binSrc) {
            Get-ChildItem -Path $binSrc -File |
              Where-Object { $_.Name -match '^NeoErp\.Distribution' } |
              ForEach-Object { Copy-Item -Path $_.FullName -Destination $binDest -Force }
          }

          # Root files
          $rootFiles = @("Web.config","Description.txt","ProductCondition.xml","packages.config")
          foreach ($file in $rootFiles) {
            $from = Join-Path $src $file
            if (Test-Path $from) { Copy-Item -Path $from -Destination $dest -Force }
          }
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 15