name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Diagnose packages
        run: |
          Write-Host "=== packages folder root ==="
          Get-ChildItem "${{ github.workspace }}\packages" | Select-Object Name

          Write-Host "`n=== EntityFramework in packages? ==="
          Get-ChildItem "${{ github.workspace }}\packages" -Recurse -Filter "EntityFramework.dll" | Select-Object FullName

          Write-Host "`n=== Newtonsoft in packages? ==="
          Get-ChildItem "${{ github.workspace }}\packages" -Recurse -Filter "Newtonsoft.Json.dll" | Select-Object FullName

          Write-Host "`n=== HintPaths in NeoErp.Data.csproj ==="
          $csproj = Get-Content "${{ github.workspace }}\Core\NeoErp.Data\NeoErp.Data.csproj"
          $csproj | Select-String "HintPath"
        shell: pwsh

      - name: 🔧 Setup MSBuild
        uses: microsoft/setup-msbuild@v2

    #   - name: 🔧 Setup NuGet
    #     uses: NuGet/setup-nuget@v2
    #     with:
    #       nuget-version: 'latest'

    #   - name: 📦 Restore NuGet packages (local source)
    #     run: |
    #       $sln = (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName
    #       nuget restore $sln -PackagesDirectory "${{ github.workspace }}\packages" -Source "${{ github.workspace }}\packages"
    #     shell: pwsh

      - name: 🏗️ Build NeoErp.Web (Release)
        run: |
          $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "csc.exe" | `
            Where-Object { $_.FullName -match "Roslyn" } | `
            Select-Object -First 1).DirectoryName

          $csproj = (Get-ChildItem -Recurse -Filter "*.csproj" | `
            Where-Object { $_.FullName -match "NeoErp.Web" } | `
            Select-Object -First 1).FullName
          Write-Host "Found project: $csproj"

          msbuild $csproj `
            /p:Configuration=Release `
            /p:Platform="AnyCPU" `
            /p:VisualStudioVersion=17.0 `
            /p:RestorePackages=false `
            /p:SolutionDir="${{ github.workspace }}\\" `
            /p:CscToolPath="$roslynPath" `
            /p:CscToolExe="csc.exe" `
            /m `
            /verbosity:minimal
        shell: pwsh

      - name: 🏗️ Build full solution (Release)
        run: |
          $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "csc.exe" | `
            Where-Object { $_.FullName -match "Roslyn" } | `
            Select-Object -First 1).DirectoryName

          $sln = (Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1).FullName
          Write-Host "Found solution: $sln"

          msbuild $sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:VisualStudioVersion=17.0 `
            /p:RestorePackages=false `
            /p:SolutionDir="${{ github.workspace }}\\" `
            /p:CscToolPath="$roslynPath" `
            /p:CscToolExe="csc.exe" `
            /m `
            /verbosity:minimal
        shell: pwsh

      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"

          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Folders
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $from = Join-Path $src $folder
            $to   = Join-Path $dest $folder
            if (Test-Path $from) {
              Write-Host "Copying folder: $folder"
              Copy-Item -Path $from -Destination $to -Recurse -Force
            }
          }

          # bin: only NeoErp.Distribution DLLs
          $binSrc  = Join-Path $src "bin\Release"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null

          Get-ChildItem -Path $binSrc -File |
            Where-Object { $_.Name -match '^NeoErp\.Distribution' } |
            ForEach-Object {
              Write-Host "Copying DLL: $($_.Name)"
              Copy-Item -Path $_.FullName -Destination $binDest -Force
            }

          # Root-level files
          $rootFiles = @(
            "Web.config","Description.txt","ProductCondition.xml",
            "GiftItemCategory.xml","DependencyRegistrar.cs",
            "DistributionAreaRegistration.cs","DistributionPlugin.cs","packages.config"
          )
          foreach ($file in $rootFiles) {
            $from = Join-Path $src $file
            if (Test-Path $from) {
              Write-Host "Copying file: $file"
              Copy-Item -Path $from -Destination $dest -Force
            }
          }

          Write-Host "`n── publish folder contents ──"
          Get-ChildItem -Path $dest -Recurse | Select-Object FullName
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 30