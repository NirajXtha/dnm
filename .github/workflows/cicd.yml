name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 🔧 Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: 📦 Restore NuGet Packages
        run: |
          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          # Create a local packages folder at the root
          New-Item -ItemType Directory -Path "${{ github.workspace }}\packages" -Force
          nuget restore "$sln" -PackagesDirectory "${{ github.workspace }}\packages"
        shell: pwsh

      - name: 🧹 Clean Project Files (Fix HintPaths)
        run: |
          # This script finds all .csproj files and removes the directory prefix from HintPaths
          # Changing '..\..\packages\' to just 'packages\' so MSBuild can find them relative to the solution
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            $content = Get-Content $_.FullName
            $content = $content -replace '\.\.\\\.\.\\packages\\', 'D:\a\dnm\dnm\packages\'
            $content = $content -replace '\.\.\\packages\\', 'D:\a\dnm\dnm\packages\'
            $content | Set-Content $_.FullName
            Write-Host "Fixed HintPaths in $($_.Name)"
          }
        shell: pwsh

      - name: 🏗️ Build Solution (Final Force Mode)
        run: |
          # 1. Locate Roslyn
          $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "csc.exe" | `
            Where-Object { $_.FullName -match "Roslyn" } | `
            Select-Object -First 1).DirectoryName

          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          
          # 2. Find the SPECIFIC DLLs that are failing
          # We search for the best matches in the packages folder
          $efDll = (Get-ChildItem -Path "D:\a\dnm\dnm\packages" -Recurse -Filter "EntityFramework.dll" | Select-Object -First 1).FullName
          $jsonDll = (Get-ChildItem -Path "D:\a\dnm\dnm\packages" -Recurse -Filter "Newtonsoft.Json.dll" | Select-Object -First 1).FullName
          $oracleDll = (Get-ChildItem -Path "D:\a\dnm\dnm\packages" -Recurse -Filter "Oracle.ManagedDataAccess.dll" | Select-Object -First 1).FullName
          
          Write-Host "Manually mapped EntityFramework to: $efDll"
          Write-Host "Manually mapped Newtonsoft to: $jsonDll"

          # 3. Create a Response File
          # We use /reference to force-feed the DLLs to the compiler
          $rspContent = @"
          /p:Configuration=Release
          /p:Platform="Any CPU"
          /p:VisualStudioVersion=17.0
          /p:SolutionDir="D:\a\dnm\dnm\\"
          /p:AdditionalLibPaths="D:\a\dnm\dnm\packages"
          /p:CscToolPath="$roslynPath"
          /p:CscToolExe="csc.exe"
          /p:RestorePackages=false
          /p:Unsafe=true
          /m
          /verbosity:minimal
          "@
          $rspContent | Out-File -FilePath "build.rsp" -Encoding utf8

          # 4. Run MSBuild
          # We also pass the specific references as properties
          msbuild "$sln" /t:Rebuild "@build.rsp" `
            /p:ReferencePath="D:\a\dnm\dnm\packages" `
            /p:ForceImportBeforeCppTargets="$(pwd)\force.targets"
        shell: pwsh

      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Copy essential folders
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $path = Join-Path $src $folder
            if (Test-Path $path) {
              Copy-Item -Path $path -Destination (Join-Path $dest $folder) -Recurse -Force
            }
          }

          # bin: Grab the compiled DLLs from the Web project's bin
          $binSrc  = "${{ github.workspace }}\NeoErp.Web\bin"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null
          if (Test-Path $binSrc) {
            Get-ChildItem -Path $binSrc -File | Where-Object { $_.Name -match '^NeoErp\.Distribution' } | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $binDest -Force
            }
          }

          # Root config files
          $rootFiles = @("Web.config","Description.txt","ProductCondition.xml")
          foreach ($file in $rootFiles) {
            $path = Join-Path $src $file
            if (Test-Path $path) { Copy-Item -Path $path -Destination $dest -Force }
          }
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 15