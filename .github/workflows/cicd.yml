name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 🔧 Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: 📦 Restore NuGet Packages
        run: |
          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          # Create a local packages folder at the root
          New-Item -ItemType Directory -Path "${{ github.workspace }}\packages" -Force
          nuget restore "$sln" -PackagesDirectory "${{ github.workspace }}\packages"
        shell: pwsh

      - name: 🏗️ Build Solution (Environment Override Mode)
        run: |
          # 1. Locate Roslyn
          $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "csc.exe" | `
            Where-Object { $_.FullName -match "Roslyn" } | `
            Select-Object -First 1).DirectoryName

          $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
          
          # 2. Collect every single DLL folder
          $libPaths = (Get-ChildItem -Path "${{ github.workspace }}\packages" -Recurse -Filter "*.dll" | `
                       Select-Object -ExpandProperty DirectoryName | `
                       Select-Object -Unique)
          $refPathString = $libPaths -join ";"

          # 3. SET SYSTEM-LEVEL ENVIRONMENT VARIABLES
          # This forces the compiler (csc.exe) to look here regardless of what the .csproj says
          $env:ReferencePath = $refPathString
          $env:LIB = $refPathString

          # 4. Create the Response File (Simplified)
          $rspContent = @"
          /p:Configuration=Release
          /p:Platform="Any CPU"
          /p:VisualStudioVersion=17.0
          /p:SolutionDir="${{ github.workspace }}\\"
          /p:CscToolPath="$roslynPath"
          /p:CscToolExe="csc.exe"
          /p:RestorePackages=false
          /m
          /verbosity:minimal
          "@
          $rspContent | Out-File -FilePath "build.rsp" -Encoding utf8

          Write-Host "Forcing ReferencePath via Environment and RSP..."
          
          # 5. Run MSBuild
          msbuild "$sln" /t:Rebuild "@build.rsp"
        shell: pwsh

      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Copy essential folders
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $path = Join-Path $src $folder
            if (Test-Path $path) {
              Copy-Item -Path $path -Destination (Join-Path $dest $folder) -Recurse -Force
            }
          }

          # bin: Grab the compiled DLLs from the Web project's bin
          $binSrc  = "${{ github.workspace }}\NeoErp.Web\bin"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null
          if (Test-Path $binSrc) {
            Get-ChildItem -Path $binSrc -File | Where-Object { $_.Name -match '^NeoErp\.Distribution' } | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $binDest -Force
            }
          }

          # Root config files
          $rootFiles = @("Web.config","Description.txt","ProductCondition.xml")
          foreach ($file in $rootFiles) {
            $path = Join-Path $src $file
            if (Test-Path $path) { Copy-Item -Path $path -Destination $dest -Force }
          }
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 15