name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: 📦 Restore NuGet Packages
        run: nuget restore (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
        shell: pwsh

      - name: 🧹 Clean Project Files (Fix Absolute HintPaths)
        run: |
          # This script rewrites every .csproj to use absolute paths on the D: drive
          # It fixes both DLL references (HintPath) and Build Tools (Import Project)
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            $content = Get-Content $_.FullName
            $absolutePath = "D:\a\dnm\dnm\packages\"
            
            # Replace relative paths with the absolute workspace path
            # Covers HintPaths, Include paths, and Project Import paths
            $content = $content -replace 'Include="\.\.\\\.\.\\packages\\', "Include=""$absolutePath"
            $content = $content -replace 'Include="\.\.\\packages\\', "Include=""$absolutePath"
            $content = $content -replace 'Project="\.\.\\\.\.\\packages\\', "Project=""$absolutePath"
            $content = $content -replace 'Project="\.\.\\packages\\', "Project=""$absolutePath"
            $content = $content -replace '<HintPath>\.\.\\\.\.\\packages\\', "<HintPath>$absolutePath"
            $content = $content -replace '<HintPath>\.\.\\packages\\', "<HintPath>$absolutePath"
            
            $content | Set-Content $_.FullName
            Write-Host "Fixed absolute paths in $($_.Name)"
          }
        shell: pwsh
      - name: 📂 Ensure local packages are available
        run: |
            $localPackages = "${{ github.workspace }}\packages"
            $nugetPackages = "D:\a\dnm\dnm\packages"

            # Create target folder if missing
            New-Item -ItemType Directory -Path $nugetPackages -Force | Out-Null

            # Copy all local packages into the MSBuild packages folder
            Copy-Item -Path "$localPackages\*" -Destination $nugetPackages -Recurse -Force

            Write-Host "Copied local packages to $nugetPackages"
        shell: pwsh

      - name: 🏗️ Build Solution
        run: |
            $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
            msbuild $sln `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:RestorePackages=false `
            /p:SolutionDir="D:\a\dnm\dnm\\" `
            /p:RestorePackagesPath="D:\a\dnm\dnm\packages" `
            /m `
            /verbosity:minimal
        shell: pwsh


      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Copy essential folders
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $path = Join-Path $src $folder
            if (Test-Path $path) {
              Copy-Item -Path $path -Destination (Join-Path $dest $folder) -Recurse -Force
            }
          }

          # bin: Grab the compiled DLLs from the Web project's bin
          $binSrc  = "${{ github.workspace }}\NeoErp.Web\bin"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null
          if (Test-Path $binSrc) {
            Get-ChildItem -Path $binSrc -File | Where-Object { $_.Name -match '^NeoErp\.Distribution' } | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $binDest -Force
            }
          }

          # Root config files
          $rootFiles = @("Web.config","Description.txt","ProductCondition.xml")
          foreach ($file in $rootFiles) {
            $path = Join-Path $src $file
            if (Test-Path $path) { Copy-Item -Path $path -Destination $dest -Force }
          }
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 15