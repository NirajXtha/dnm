name: CI/CD - NeoErp.Distribution Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-publish:
    name: 🏗️ Build & Publish NeoErp.Distribution
    runs-on: windows-latest

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: 📦 Restore NuGet Packages
        run: nuget restore (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
        shell: pwsh

      - name: 📂 Merge local packages into runner packages folder and verify
        run: |
            $runnerPackages = "D:\a\dnm\dnm\packages"
            # Ensure runner packages folder exists
            New-Item -ItemType Directory -Path $runnerPackages -Force | Out-Null

            # Find all 'packages' folders inside the checked-out repo
            $repoPackages = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Directory -Filter packages -ErrorAction SilentlyContinue

            if (-not $repoPackages) {
            Write-Host "No packages folders found in repo."
            } else {
            foreach ($pkgDir in $repoPackages) {
                $src = $pkgDir.FullName
                # Skip if source is same as runner target
                if ($src.TrimEnd('\') -ieq $runnerPackages.TrimEnd('\')) {
                Write-Host "Skipping copy: source equals destination: $src"
                continue
                }
                Write-Host "Copying from $src to $runnerPackages"
                Copy-Item -Path (Join-Path $src '*') -Destination $runnerPackages -Recurse -Force
            }
            }

            # Quick verification: list top-level package folders and check for key files
            Write-Host "=== Runner packages folder contents (top-level) ==="
            Get-ChildItem -Path $runnerPackages -Directory | Select-Object -First 50 | ForEach-Object { Write-Host $_.Name }

            # Check for common assemblies / nupkgs that must be present
            $checks = @(
            "Newtonsoft.Json",
            "EntityFramework",
            "Oracle.ManagedDataAccess",
            "Oracle.ManagedDataAccess.EntityFramework"
            )

            foreach ($c in $checks) {
            $found = Get-ChildItem -Path $runnerPackages -Recurse -Filter "*$c*.nupkg" -ErrorAction SilentlyContinue
            if ($found) {
                Write-Host "FOUND package artifacts for $c"
            } else {
                $dllFound = Get-ChildItem -Path $runnerPackages -Recurse -Include "$c*.dll" -ErrorAction SilentlyContinue
                if ($dllFound) {
                Write-Host "FOUND DLLs for $c"
                } else {
                Write-Host "MISSING: $c (no nupkg or dll found in $runnerPackages)"
                }
            }
            }

            # Fail early if critical packages are missing (optional)
            $missing = @()
            foreach ($c in $checks) {
            $exists = (Get-ChildItem -Path $runnerPackages -Recurse -Filter "*$c*.nupkg" -ErrorAction SilentlyContinue) -or
                        (Get-ChildItem -Path $runnerPackages -Recurse -Include "$c*.dll" -ErrorAction SilentlyContinue)
            if (-not $exists) { $missing += $c }
            }
            if ($missing.Count -gt 0) {
            Write-Host "ERROR: The following critical packages are missing: $($missing -join ', ')"
            exit 1
            } else {
            Write-Host "All critical packages present."
            }
        shell: pwsh

      - name: 🧹 Clean Project Files (Fix Absolute HintPaths)
        run: |
          # This script rewrites every .csproj to use absolute paths on the D: drive
          # It fixes both DLL references (HintPath) and Build Tools (Import Project)
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            $content = Get-Content $_.FullName
            $absolutePath = "D:\a\dnm\dnm\packages\"
            
            # Replace relative paths with the absolute workspace path
            # Covers HintPaths, Include paths, and Project Import paths
            $content = $content -replace 'Include="\.\.\\\.\.\\packages\\', "Include=""$absolutePath"
            $content = $content -replace 'Include="\.\.\\packages\\', "Include=""$absolutePath"
            $content = $content -replace 'Project="\.\.\\\.\.\\packages\\', "Project=""$absolutePath"
            $content = $content -replace 'Project="\.\.\\packages\\', "Project=""$absolutePath"
            $content = $content -replace '<HintPath>\.\.\\\.\.\\packages\\', "<HintPath>$absolutePath"
            $content = $content -replace '<HintPath>\.\.\\packages\\', "<HintPath>$absolutePath"
            
            $content | Set-Content $_.FullName
            Write-Host "Fixed absolute paths in $($_.Name)"
          }
        shell: pwsh

      - name: 📂 Ensure local packages are available
        run: |
            $nugetPackages = "D:\a\dnm\dnm\packages"

            # Create target folder if missing
            New-Item -ItemType Directory -Path $nugetPackages -Force | Out-Null

            # Copy packages from each project folder into the MSBuild packages folder
            $projectPackages = @(
            "${{ github.workspace }}\NeoErp.Web\packages",
            "${{ github.workspace }}\NeoErp.Data\packages"
            )

            foreach ($localPackages in $projectPackages) {
            if (Test-Path $localPackages) {
                Write-Host "Copying local packages from $localPackages to $nugetPackages"
                Copy-Item -Path "$localPackages\*" -Destination $nugetPackages -Recurse -Force
            } else {
                Write-Host "No local packages folder found at $localPackages"
            }
            }
        shell: pwsh

      - name: 🏗️ Build Solution
        run: |
            $msbuildPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" | Where-Object { $_.FullName -match "Bin" } | Select-Object -First 1).FullName
            $roslynPath = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "csc.exe" | Where-Object { $_.FullName -match "Roslyn" } | Select-Object -First 1).DirectoryName
            $sln = (Get-ChildItem -Filter "*.sln" | Select-Object -First 1).FullName
            & $msbuildPath "$sln" /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:VisualStudioVersion=17.0 /p:SolutionDir="${{ github.workspace }}\\" /p:CscToolPath="$roslynPath" /p:CscToolExe="csc.exe" /p:RestorePackages=false /p:ForceFullPaths=true /m /verbosity:minimal
        shell: pwsh

      - name: 📂 Collect plugin into publish folder
        run: |
          $src  = "${{ github.workspace }}\NeoErp.Web\Areas\NeoErp.Distribution"
          $dest = "${{ github.workspace }}\publish"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Copy essential folders
          $folders = @("Views","Content","Scripts","Images","fonts","js","Areas","App_Start")
          foreach ($folder in $folders) {
            $path = Join-Path $src $folder
            if (Test-Path $path) {
              Copy-Item -Path $path -Destination (Join-Path $dest $folder) -Recurse -Force
            }
          }

          # bin: Grab the compiled DLLs from the Web project's bin
          $binSrc  = "${{ github.workspace }}\NeoErp.Web\bin"
          $binDest = Join-Path $dest "bin"
          New-Item -ItemType Directory -Path $binDest -Force | Out-Null
          if (Test-Path $binSrc) {
            Get-ChildItem -Path $binSrc -File | Where-Object { $_.Name -match '^NeoErp\.Distribution' } | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $binDest -Force
            }
          }

          # Root config files
          $rootFiles = @("Web.config","Description.txt","ProductCondition.xml")
          foreach ($file in $rootFiles) {
            $path = Join-Path $src $file
            if (Test-Path $path) { Copy-Item -Path $path -Destination $dest -Force }
          }
        shell: pwsh

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoErp.Distribution-v${{ github.run_number }}
          path: ${{ github.workspace }}\publish\
          retention-days: 15